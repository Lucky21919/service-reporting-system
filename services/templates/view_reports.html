<!DOCTYPE html>
<html>
<head>
    <title>All Reports</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .container {
            width: 60%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        h1 {
            text-align: center;
        }
        .report {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }
        .btn {
            display: block;
            text-align: center;
            background: green;
            color: white;
            padding: 10px;
            margin-bottom: 10px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Community Reports</h1>

        <a href="/create/" class="btn">+ Create Report</a>

        {% for report in reports %}
            <div class="report">
                <h3>{{ report.title }}</h3>
                <p>{{ report.description }}</p>
                <p><strong>Location:</strong> {{ report.location }}</p>
                <p><small>{{ report.date_reported }}</small></p>
            </div>
        {% empty %}
            <p>No reports yet.</p>
        {% endfor %}
    </div>
</body>
</html>
